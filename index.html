<style>

    border-radius: 8px;
    font-family: inherit;

input:focus, select:focus {
    outline: none;
    border-color: #0366d6;

    font-weight: 600;
    color: #333;
    margin-top: 12px;

label:first-of-type {
    margin-top: 0;
}

.tabs {

    padding: 8px;
    border-radius: 12px;

.tabs button {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 13px;
    border: none;
    border-radius: 8px;
    background: #f0f0f0;
    color: #333;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}

.tabs button.active {
    background: #0366d6;
    color: white;
    font-weight: 600;
}

button {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.result {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    border-left: 4px solid #0366d6;
}

.result b {
    color: #0366d6;
}

.code {
    border-bottom: 1px solid #e0e0e0;
    padding: 12px;
    cursor: pointer;
    transition: background 0.2s;
}

.code:hover {
    background: #f9f9f9;
}

.code:active {
    background: #f0f0f0;
}

.small {
    font-size: 12px;
    color: #999;
    margin-top: -8px;
    margin-bottom: 8px;
}

.code-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
}

.code-filter button {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 12px;
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    white-space: nowrap;
}

.code-filter button.active {
    background: #0366d6;
    color: white;
    border-color: #0366d6;
}

.install-btn {
    display: none;
    background: #0366d6;
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    cursor: pointer;
}

.install-btn.show {
    display: block;
}

img.tool-img {
    max-height: 120px;
    display: block;
    margin: 12px auto;
}

p {
    margin: 12px 0;
    color: #555;
    line-height: 1.5;
}

.hide {
    display: none !important;
}

.help-box {

    border-left: 4px solid #0366d6;

    font-size: 13px;

.help-box b {

}

.anilam-section {
    margin: 12px 0;

.anilam-section h3 {

    font-size: 14px;
    margin: 12px 0 8px 0;

<body>

<!-- HEADER -->
<div class="header">
    <img src="All-Steel_web.png" alt="All Steel">
    <h1>CNC PRO</h1>
</div>

<!-- INSTALL BUTTON -->
<div id="installBtn" class="install-btn">
    📥 Installer som app
</div>

<div class="container">

<!-- TABS -->
<div class="tabs">
    <button class="active" onclick="showTab('calc')">Calc</button>
    <button onclick="showTab('zero')">Zero</button>
    <button onclick="showTab('g')">G/M</button>
    <button onclick="showTab('anilam')">Anilam</button>
</div>

<!-- CALC -->
<div id="calc" class="card">

<img src="tool.gif" class="tool-img" alt="CNC Tool">

<label><b>Diameter (mm)</b>
    <input id="diameter" type="number" value="10">
</label>

<label><b>Materiale</b>
    <select id="material" onchange="updateVC()">
        <option value="stål">Stål</option>
        <option value="rustfri">Rustfri</option>
        <option value="alu">Aluminium</option>
        <option value="jern">Jern</option>
    </select>
</label>

<label><b>Værktøjstype</b>
    <select id="tool" onchange="updateVC()">
        <option value="HM">HM (Hårdmetal)</option>
        <option value="HSS">HSS</option>
    </select>
</label>

<label><b>Skærehastighed vc (m/min)</b>
    <input id="vc" type="number">
</label>
<div class="small">Automatisk forslag – kan ændres</div>

<label><b>Antal tænder (z)</b>
    <input id="teeth" type="number" value="4">
</label>

<label><b>Feed pr tand fz (mm)</b>
    <input id="fz" type="number" step="0.01" value="0.05">
</label>

<div class="result">
    <b>RPM:</b> <span id="rpm">0</span><br>
    <b>Feed:</b> <span id="feed">0</span> mm/min
</div>

</div>

<!-- ZERO -->
<div id="zero" class="card hide">

<p><b>Punkt 1:</b> Mål første side af emnet</p>
<p><b>Punkt 2:</b> Mål modsatte side</p>

<input id="m1" type="number" placeholder="Måling 1">
<input id="m2" type="number" placeholder="Måling 2">

<div class="result">
    <b>Nulpunkt:</b> <span id="zeroRes">-</span>
</div>

</div>

<!-- G/M CODE -->
<div id="g" class="card hide">

<input id="search" type="text" placeholder="🔍 Søg kode...">

<div class="code-filter">
    <button class="active" onclick="filterByType('all')">Alle</button>
    <button onclick="filterByType('g')">G-koder</button>
    <button onclick="filterByType('m')">M-koder</button>
</div>

<div id="list"></div>

<div id="detail" class="result" style="display:none;"></div>

</div>

<!-- ANILAM CRUSADER -->
<div id="anilam" class="card hide">

<input id="anilam-search" type="text" placeholder="🔍 Søg Anilam kode...">

<div class="code-filter">
    <button class="active" onclick="filterAnilam('all')">Alle</button>
    <button onclick="filterAnilam('g')">G-koder</button>
    <button onclick="filterAnilam('aux')">AUX Func</button>
    <button onclick="filterAnilam('arc')">ARC</button>
</div>

<div id="anilam-list"></div>

<div id="anilam-detail" class="result" style="display:none;"></div>

</div>

</div>

<script>

// PWA Installation
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        deferredPrompt = null;
        document.getElementById('installBtn').classList.remove('show');
    }
});

window.addEventListener('appinstalled', () => {
    console.log('CNC PRO Tool installed');
});

// Register Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
}

// VC tabel
const vcTable = {
    stål: { HM:150, HSS:30 },
    rustfri: { HM:80, HSS:20 },
    alu: { HM:300, HSS:80 },
    jern: { HM:120, HSS:25 }
};

// G-koder og M-koder
const codes = [
    // G-koder
    { type:"g", code:"G00", desc:"Hurtig positionering", detail:"Lineær hurtig bevægelse uden skæring\nSyntaks: G00 X Y Z" },
    { type:"g", code:"G01", desc:"Lineær interpolation", detail:"Lineær bevægelse med skæring\nSyntaks: G01 X Y Z F" },
    { type:"g", code:"G02", desc:"Cirkulær CW", detail:"Cirkulær bevægelse med ur\nSyntaks: G02 X Y I J F" },
    { type:"g", code:"G03", desc:"Cirkulær CCW", detail:"Cirkulær bevægelse mod ur\nSyntaks: G03 X Y I J F" },
    { type:"g", code:"G04", desc:"Dwell", detail:"Pause i programmet\nSyntaks: G04 P[tid ms]" },
    { type:"g", code:"G17", desc:"XY plan", detail:"Vælger XY plan til cirkler" },
    { type:"g", code:"G18", desc:"ZX plan", detail:"Vælger ZX plan til cirkler" },
    { type:"g", code:"G19", desc:"YZ plan", detail:"Vælger YZ plan til cirkler" },
    { type:"g", code:"G20", desc:"Tommer (inch)", detail:"Programmet kører i tommer" },
    { type:"g", code:"G21", desc:"Millimeter", detail:"Programmet kører i millimeter" },
    { type:"g", code:"G28", desc:"Home", detail:"Kører til maskinens nulpunkt\nSyntaks: G28 X Y Z" },
    { type:"g", code:"G40", desc:"Ingen kompensation", detail:"Værktøjsradius uden kompensation" },
    { type:"g", code:"G41", desc:"Radius komp venstre", detail:"Værktøjsradius kompensation venstre\nSyntaks: G41 D[værktøj nummer]" },
    { type:"g", code:"G42", desc:"Radius komp højre", detail:"Værktøjsradius kompensation højre\nSyntaks: G42 D[værktøj nummer]" },
    { type:"g", code:"G43", desc:"Længde kompensation +", detail:"Værktøjslængde kompensation plus\nSyntaks: G43 H[værktøj nummer] Z" },
    { type:"g", code:"G49", desc:"Ingen længde komp", detail:"Værktøjslængde uden kompensation" },
    { type:"g", code:"G54-G59", desc:"Arbejdskoordinat", detail:"Vælger arbejdskoordinatsystem 1-6" },
    { type:"g", code:"G65", desc:"Makro kald", detail:"Kalder makrounderprogrammer" },
    { type:"g", code:"G70", desc:"Finish cyklus", detail:"Finishing af boring eller gevind" },
    { type:"g", code:"G71", desc:"Roughing cyklus", detail:"Grovbearbejdning med emnedeling" },
    { type:"g", code:"G80", desc:"Annuller boring", detail:"Annullerer alle borings cyklusser" },
    { type:"g", code:"G81", desc:"Simpel boring", detail:"Fast boring\nSyntaks: G81 X Y Z R F" },
    { type:"g", code:"G82", desc:"Boring med dwell", detail:"Boring med pause\nSyntaks: G82 X Y Z R P F" },
    { type:"g", code:"G83", desc:"Peck boring", detail:"Boring med chips fjernelse\nQ = dybde pr stik\nSyntaks: G83 X Y Z R Q F" },
    { type:"g", code:"G84", desc:"Gevind boring", detail:"Gevind skæring ved boring\nSyntaks: G84 X Y Z R F" },
    { type:"g", code:"G85", desc:"Boring med retræk", detail:"Boring med hurtigt retræk\nSyntaks: G85 X Y Z R F" },
    { type:"g", code:"G90", desc:"Absolut koordinat", detail:"Koordinater som absolutte værdier" },
    { type:"g", code:"G91", desc:"Relativ koordinat", detail:"Koordinater som relative værdier" },
    { type:"g", code:"G92", desc:"Set position", detail:"Definerer nuværende position\nSyntaks: G92 X Y Z" },
    { type:"g", code:"G94", desc:"Feed mm/min", detail:"Feed i mm/min" },
    { type:"g", code:"G95", desc:"Feed per omdrejning", detail:"Feed som mm/omdrejning" },
    { type:"g", code:"G98", desc:"Retræk til R plan", detail:"Retræk til R værdi efter boring" },
    { type:"g", code:"G99", desc:"Retræk til start", detail:"Retræk til Z værdi fra start" },

    // M-koder
    { type:"m", code:"M00", desc:"Pause", detail:"Program pause - manuel genstart" },
    { type:"m", code:"M01", desc:"Betinget pause", detail:"Valgfri pause hvis knap er aktiveret" },
    { type:"m", code:"M02", desc:"Program slut", detail:"Afslutter program uden reset" },
    { type:"m", code:"M03", desc:"Spindel CW", detail:"Spindel rotation med uret\nSyntaks: M03 S[RPM]" },
    { type:"m", code:"M04", desc:"Spindel CCW", detail:"Spindel rotation mod uret\nSyntaks: M04 S[RPM]" },
    { type:"m", code:"M05", desc:"Spindel stop", detail:"Stanser spindelrotation" },
    { type:"m", code:"M06", desc:"Værktøjsbyt", detail:"Pauserer for manuel værktøjsbytning\nSyntaks: M06 T[værktøj nummer]" },
    { type:"m", code:"M07", desc:"Køler 2", detail:"Aktiverer anden kølervæske" },
    { type:"m", code:"M08", desc:"Køler 1", detail:"Aktiverer primær kølervæske" },
    { type:"m", code:"M09", desc:"Køler stop", detail:"Stoppper al kølervæske" },
    { type:"m", code:"M10", desc:"Emne spænding", detail:"Spænder emnet" },
    { type:"m", code:"M11", desc:"Emne løsning", detail:"Løsner emnet" },
    { type:"m", code:"M13", desc:"Spindel + køler", detail:"Spindel CW og køler på\nSyntaks: M13 S[RPM]" },
    { type:"m", code:"M14", desc:"Spindel CCW + køler", detail:"Spindel CCW og køler på" },
    { type:"m", code:"M19", desc:"Spindel orientering", detail:"Orienterer spindel til position" },
    { type:"m", code:"M21", desc:"Emne skifter", detail:"Automatisk emne skifter" },
    { type:"m", code:"M30", desc:"Program slut", detail:"Afslutter program og resets" },
    { type:"m", code:"M98", desc:"Subprogram kald", detail:"Kalder subprogram\nSyntaks: M98 P[program nr]" },
    { type:"m", code:"M99", desc:"Subprogram slut", detail:"Afslutter subprogram og vender tilbage" }
];

// Anilam Crusader Series-ML koder
const anilam = [
    // G-koder
    { type:"g", code:"G00", desc:"Rapid Positioning", detail:"ANILAM CRUSADER-ML\n\nHurtig positionering uden skæring.\nForflyttelse til næste værktøjsposition\nmed maksimal hastighed.\n\nSyntaks: G00 X__ Y__ Z__\n\nEksempel: G00 X100 Y50 Z10\n(Hurtig gang til position X100, Y50, Z10)" },
    { type:"g", code:"G01", desc:"Linear Interpolation", detail:"ANILAM CRUSADER-ML\n\nLineær interpolation med konstant\nfremfødshastighed.\n\nSyntaks: G01 X__ Y__ Z__ F__\n\nEksempel: G01 X50 Y25 Z5 F200\n(Lineær bevægelse med fremfødning 200 mm/min)" },
    { type:"g", code:"G02", desc:"Circular CW", detail:"ANILAM CRUSADER-ML\n\nCirkulær interpolation med uret.\nDefiner centerpunkt med I og J.\n\nSyntaks: G02 X__ Y__ I__ J__ F__\n\nEksempel: G02 X100 Y100 I50 J50 F150\n(CW bue fra punkt til (100,100) med centrum på (50,50))" },
    { type:"g", code:"G03", desc:"Circular CCW", detail:"ANILAM CRUSADER-ML\n\nCirkulær interpolation mod uret.\nDefiner centerpunkt med I og J.\n\nSyntaks: G03 X__ Y__ I__ J__ F__\n\nEksempel: G03 X100 Y100 I50 J50 F150\n(CCW bue fra punkt til (100,100) med centrum på (50,50))" },
    { type:"g", code:"G04", desc:"Dwell (Pause)", detail:"ANILAM CRUSADER-ML\n\nPause/dwell i programmet.\nVentetid i sekunder.\n\nSyntaks: G04 P__\n\nEksempel: G04 P2\n(Pause i 2 sekunder)" },
    { type:"g", code:"G33", desc:"Electronic Threading", detail:"ANILAM CRUSADER-ML\n\nElektronisk gevindskæring.\nBrugt til præcis gevindproduktion.\n\nSyntaks: G33 X__ Z__ K__\n\nK = gevindstigning\nEksempel: G33 X15 Z50 K1.5\n(Gevind med stigning 1.5 mm)" },
    { type:"g", code:"G40", desc:"Cutter Comp Cancel", detail:"ANILAM CRUSADER-ML\n\nAnnuller værktøjsradius kompensation.\n\nSyntaks: G40\n\nAlltid slut med denne for at annullere\nradius kompensation før programslut." },
    { type:"g", code:"G41", desc:"Cutter Comp Left", detail:"ANILAM CRUSADER-ML\n\nVærktøjsradius kompensation VENSTRE.\nDer skal være værktøj defineret i offsettabel.\n\nSyntaks: G41 D__\n\nEksempel: G41 D01\n(Venstre kompensation med værktøj 01)" },
    { type:"g", code:"G42", desc:"Cutter Comp Right", detail:"ANILAM CRUSADER-ML\n\nVærktøjsradius kompensation HØJRE.\nDer skal være værktøj defineret i offsettabel.\n\nSyntaks: G42 D__\n\nEksempel: G42 D02\n(Højre kompensation med værktøj 02)" },
    { type:"g", code:"G70", desc:"Finishing Cycle", detail:"ANILAM CRUSADER-ML\n\nFinishing cyklus.\nEfterfølges af formcyklus.\n\nSyntaks: G70 P__ Q__\n\nP = første blok\nQ = sidste blok\nEksempel: G70 P10 Q20" },
    { type:"g", code:"G71", desc:"Stock Removal", detail:"ANILAM CRUSADER-ML\n\nGrovbearbejdning med automatisk\nemnedeling.\n\nSyntaks: G71 P__ Q__ U__ W__\n\nU = X-retning tillæg\nW = Z-retning tillæg" },
    { type:"g", code:"G90", desc:"Absolute Positioning", detail:"ANILAM CRUSADER-ML\n\nAbsolutkoordinater.\nKoordinaterne er fra maskinens\nnulpunkt.\n\nSyntaks: G90 (modal - påvirker alt efter)" },
    { type:"g", code:"G91", desc:"Incremental Positioning", detail:"ANILAM CRUSADER-ML\n\nRelative koordinater.\nKoordinaterne er fra aktuel position.\n\nSyntaks: G91 (modal - påvirker alt efter)" },
    { type:"g", code:"G92", desc:"Set Position", detail:"ANILAM CRUSADER-ML\n\nDefinerer nuværende position som\nde angivne værdier.\n\nSyntaks: G92 X__ Z__\n\nEksempel: G92 X0 Z0\n(Sætter aktuel position som 0,0)" },
    { type:"g", code:"G94", desc:"Feed/Minute Mode", detail:"ANILAM CRUSADER-ML\n\nFremfødning i mm/minut.\nStandard fremfødningstype.\n\nSyntaks: G94 F__\n\nEksempel: G94 F200\n(Fremfødning 200 mm/min)" },
    { type:"g", code:"G95", desc:"Feed/Revolution", detail:"ANILAM CRUSADER-ML\n\nFremfødning pr. omdrejning (mm/rev).\nBruges ved gevindskæring.\n\nSyntaks: G95 F__\n\nEksempel: G95 F0.5\n(Fremfødning 0.5 mm pr. omdrejning)" },

    // AUX Functions
    { type:"aux", code:"M03", desc:"Spindel Start CW", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nStarter spindel med urets retning.\nMed speed værdi.\n\nSyntaks: M03 S__\n\nS = RPM\nEksempel: M03 S1200\n(Start spindel 1200 RPM med uret)" },
    { type:"aux", code:"M04", desc:"Spindel Start CCW", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nStarter spindel mod urets retning.\nMed speed værdi.\n\nSyntaks: M04 S__\n\nS = RPM\nEksempel: M04 S1000\n(Start spindel 1000 RPM mod uret)" },
    { type:"aux", code:"M05", desc:"Spindel Stop", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nStopper spindelrotation.\n\nSyntaks: M05\n\nAlleredie tilrådede før værktøjsbytning" },
    { type:"aux", code:"M08", desc:"Coolant ON", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nTænder kølevæske.\n\nSyntaks: M08\n\nAnvendes typisk før skæring" },
    { type:"aux", code:"M09", desc:"Coolant OFF", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nSlukker kølevæske.\n\nSyntaks: M09\n\nAnvendes ved programslut" },
    { type:"aux", code:"M10", desc:"Tailstock Clamp", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nSpænder løbespids (hvis installeret).\n\nSyntaks: M10\n\nSikrer emne under bearbejdning" },
    { type:"aux", code:"M11", desc:"Tailstock Release", detail:"ANILAM CRUSADER-ML - AUX FUNCTION\n\nLøsner løbespids.\n\nSyntaks: M11\n\nFor fjernelse af emne" },

let currentFilter = "all";
let currentAnilam = "all";

// Tabs
function showTab(name){
    document.getElementById("calc").classList.toggle("hide", name !== "calc");
    document.getElementById("zero").classList.toggle("hide", name !== "zero");
    document.getElementById("g").classList.toggle("hide", name !== "g");
    document.getElementById("anilam").classList.toggle("hide", name !== "anilam");
    
    // Update tab buttons
    document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.toggle("active", 
            (name === "calc" && btn.textContent === "Calc") ||
            (name === "zero" && btn.textContent === "Zero") ||
            (name === "g" && btn.textContent === "G/M") ||
            (name === "anilam" && btn.textContent === "Anilam")
        );
    });
}

// Auto VC
function updateVC(){
    let mat = document.getElementById("material").value;
    let tool = document.getElementById("tool").value;
    document.getElementById("vc").value = vcTable[mat][tool];
}

// Beregning loop
setInterval(()=>{
    let d = parseFloat(document.getElementById("diameter").value);
    let vc = parseFloat(document.getElementById("vc").value);
    let z = parseFloat(document.getElementById("teeth").value);
    let fz = parseFloat(document.getElementById("fz").value);

    if(d && vc){
        let rpm = Math.round((vc*1000)/(Math.PI*d));
        let feed = Math.round(rpm*z*fz);

        document.getElementById("rpm").innerText = rpm;
        document.getElementById("feed").innerText = feed;
    }

    let m1 = parseFloat(document.getElementById("m1").value);
    let m2 = parseFloat(document.getElementById("m2").value);

    if(m1 && m2){
        document.getElementById("zeroRes").innerText = ((m1+m2)/2).toFixed(3);
    }

},200);

// Filter by type
function filterByType(type){
    currentFilter = type;
    
    // Update active button
    document.querySelectorAll("#g .code-filter button").forEach(btn => {
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
    
    filterCodes();
}

// Filter Anilam
function filterAnilam(type){
    currentAnilam = type;
    
    // Update active button
    document.querySelectorAll("#anilam .code-filter button").forEach(btn => {
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
    
    filterAnilam_Codes();
}

// Koder filter
function filterCodes(){
    let q = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("list");
    list.innerHTML="";
    let detailDiv = document.getElementById("detail");

    codes.forEach(c=>{
        // Filter by type
        if(currentFilter !== "all" && c.type !== currentFilter) return;

        // Filter by search
        if(q && !c.code.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return;

        let div = document.createElement("div");
        div.className="code";
        div.innerText = c.code + " - " + c.desc;

        div.onclick = ()=>{
            detailDiv.innerText = c.code + " - " + c.desc + "\n\n" + c.detail;
            detailDiv.style.display = "block";
        };

        list.appendChild(div);
    });
}

// Anilam koder filter
function filterAnilam_Codes(){
    let q = document.getElementById("anilam-search").value.toLowerCase();
    let list = document.getElementById("anilam-list");
    list.innerHTML="";
    let detailDiv = document.getElementById("anilam-detail");

    anilam.forEach(a=>{
        // Filter by type
        if(currentAnilam !== "all" && a.type !== currentAnilam) return;

        // Filter by search
        if(q && !a.code.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return;

        let div = document.createElement("div");
        div.className="code";
        div.innerText = a.code + " - " + a.desc;

        div.onclick = ()=>{
            detailDiv.innerText = a.code + " - " + a.desc + "\n\n" + a.detail;
            detailDiv.style.display = "block";
        };

        list.appendChild(div);
    });
}

// init
updateVC();
filterCodes();
filterAnilam_Codes();

</script>
