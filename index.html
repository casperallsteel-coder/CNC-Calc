<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;

}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
}

.header {
    background: #0366d6;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: max(12px, env(safe-area-inset-top));

}

.header img {
    max-height: 50px;
}

.header h1 {

    flex: 1;

.container {

    padding-bottom: max(10px, env(safe-area-inset-bottom));
}

.card {
    background: white;
    padding: 16px;
    margin-bottom: 12px;
    border-radius: 12px;

}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 12px;
    font-size: 16px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-family: inherit;
}

input:focus, select:focus {
    outline: none;
    border-color: #0366d6;
    box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1);
}

label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-top: 12px;
}

label:first-of-type {
    margin-top: 0;
}

.tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: white;
    padding: 8px;
    border-radius: 12px;
    overflow-x: auto;
}

.tabs button {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 13px;
    border: none;
    border-radius: 8px;
    background: #f0f0f0;
    color: #333;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}

.tabs button.active {
    background: #0366d6;
    color: white;
    font-weight: 600;
}

button {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.result {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    white-space: pre-wrap;
    font-family: 'Courier New', monospace;
    border-left: 4px solid #0366d6;
}

.result b {
    color: #0366d6;
}

.code {
    border-bottom: 1px solid #e0e0e0;
    padding: 12px;
    cursor: pointer;
    transition: background 0.2s;
}

.code:hover {
    background: #f9f9f9;
}

.code:active {
    background: #f0f0f0;
}

.small {
    font-size: 12px;
    color: #999;
    margin-top: -8px;
    margin-bottom: 8px;
}

.code-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    overflow-x: auto;
}

.code-filter button {
    flex: 0 0 auto;
    padding: 10px 14px;
    font-size: 12px;
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    white-space: nowrap;
}

.code-filter button.active {
    background: #0366d6;
    color: white;
    border-color: #0366d6;
}

.install-btn {
    display: none;
    background: #0366d6;
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
    cursor: pointer;
}

.install-btn.show {

}

img.tool-img {

p {

<!-- HEADER -->
<div class="header">

</div>

<!-- INSTALL BUTTON -->

</div>

<div class="container">

<!-- TABS -->
<div class="tabs">
    <button class="active" onclick="showTab('calc')">Calc</button>
    <button onclick="showTab('zero')">Zero</button>

    <button onclick="showTab('anilam')">Anilam</button>

<label><b>Diameter (mm)</b>
    <input id="diameter" type="number" value="10">
</label>

<label><b>Materiale</b>
    <select id="material" onchange="updateVC()">
        <option value="stål">Stål</option>
        <option value="rustfri">Rustfri</option>
        <option value="alu">Aluminium</option>
        <option value="jern">Jern</option>
    </select>
</label>

<label><b>Værktøjstype</b>

        <option value="HM">HM (Hårdmetal)</option>
        <option value="HSS">HSS</option>

<label><b>Skærehastighed vc (m/min)</b>
    <input id="vc" type="number">

<div class="small">Automatisk forslag – kan ændres</div>

<label><b>Antal tænder (z)</b>

</label>

<label><b>Feed pr tand fz (mm)</b>

<!-- G/M CODE -->
<div id="g" class="card hide">

<div class="code-filter">

    <button onclick="filterAnilam('aux')">AUX</button>

<div id="anilam-detail" class="result" style="display:none;"></div>

<script>

// PWA Installation
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').classList.add('show');
});

document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to the install prompt: ${outcome}`);
        deferredPrompt = null;
        document.getElementById('installBtn').classList.remove('show');
    }
});

window.addEventListener('appinstalled', () => {
    console.log('CNC PRO Tool installed');
});

// Register Service Worker

let currentFilter = "all";
let currentAnilam = "all";

// Tabs
function showTab(name){
    document.getElementById("calc").classList.toggle("hide", name !== "calc");
    document.getElementById("zero").classList.toggle("hide", name !== "zero");
    document.getElementById("g").classList.toggle("hide", name !== "g");
    document.getElementById("anilam").classList.toggle("hide", name !== "anilam");
    
    // Update tab buttons
    document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.toggle("active", 
            (name === "calc" && btn.textContent === "Calc") ||
            (name === "zero" && btn.textContent === "Zero") ||
            (name === "g" && btn.textContent === "G/M") ||
            (name === "anilam" && btn.textContent === "Anilam")
        );
    });
}

// Auto VC
function updateVC(){
    let mat = document.getElementById("material").value;
    let tool = document.getElementById("tool").value;
    document.getElementById("vc").value = vcTable[mat][tool];
}

// Beregning loop
setInterval(()=>{
    let d = parseFloat(document.getElementById("diameter").value);
    let vc = parseFloat(document.getElementById("vc").value);
    let z = parseFloat(document.getElementById("teeth").value);
    let fz = parseFloat(document.getElementById("fz").value);

    if(d && vc){
        let rpm = Math.round((vc*1000)/(Math.PI*d));
        let feed = Math.round(rpm*z*fz);

        document.getElementById("rpm").innerText = rpm;
        document.getElementById("feed").innerText = feed;
    }

    let m1 = parseFloat(document.getElementById("m1").value);
    let m2 = parseFloat(document.getElementById("m2").value);

    if(m1 && m2){
        document.getElementById("zeroRes").innerText = ((m1+m2)/2).toFixed(3);
    }

},200);

// Filter by type
function filterByType(type){
    currentFilter = type;
    
    // Update active button
    document.querySelectorAll("#g .code-filter button").forEach(btn => {
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
    
    filterCodes();
}

// Filter Anilam
function filterAnilam(type){
    currentAnilam = type;
    
    // Update active button
    document.querySelectorAll("#anilam .code-filter button").forEach(btn => {
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
    
    filterAnilam_Codes();
}

// Koder filter
function filterCodes(){
    let q = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("list");
    list.innerHTML="";
    let detailDiv = document.getElementById("detail");

    codes.forEach(c=>{
        // Filter by type
        if(currentFilter !== "all" && c.type !== currentFilter) return;

        // Filter by search
        if(q && !c.code.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return;

        let div = document.createElement("div");
        div.className="code";
        div.innerText = c.code + " - " + c.desc;

        div.onclick = ()=>{
            detailDiv.innerText = c.code + " - " + c.desc + "\n\n" + c.detail;
            detailDiv.style.display = "block";
        };

        list.appendChild(div);
    });
}

// Anilam koder filter
function filterAnilam_Codes(){
    let q = document.getElementById("anilam-search").value.toLowerCase();
    let list = document.getElementById("anilam-list");
    list.innerHTML="";
    let detailDiv = document.getElementById("anilam-detail");

    anilam.forEach(a=>{
        if(currentAnilam !== "all" && a.group !== currentAnilam) return;

        if(q && !a.code.toLowerCase().includes(q) && !a.desc.toLowerCase().includes(q)) return;

        let div = document.createElement("div");
        div.className="code";
        div.innerHTML = `<b>${a.code}</b> - ${a.desc}`;

        div.onclick = ()=>{
            detailDiv.innerText = a.code + " - " + a.desc + "\n\n" + a.detail;
            detailDiv.style.display = "block";
        };

        list.appendChild(div);
    });
}

// init
updateVC();
filterCodes();
filterAnilam_Codes();

</script>
