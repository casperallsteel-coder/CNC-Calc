<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC PRO Tool</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.header {
    background: #0366d6;
    color: white;
    padding: 10px;
    text-align: center;
}

.header img {
    max-height: 60px;
    display: block;
    margin: auto;
}

.header h1 {
    margin-top: 6px;
    font-size: 18px;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.tabs {
    display:flex;
    gap:5px;
    margin-bottom:10px;
}

button {
    flex:1;
    padding:10px;
}

input, select {
    width:100%;
    padding:10px;
    margin-bottom:8px;
}

.result {
    background:#eee;
    padding:10px;
    white-space:pre-wrap;
}

.code {
    border-bottom:1px solid #ddd;
    padding:8px;
    cursor:pointer;
}

.help-box {
    background:#eef6ff;
    padding:10px;
    font-size:13px;
    margin-bottom:10px;
}

.hide {
    display:none;
}
</style>
</head>

<body>

<!-- ✅ NY HEADER -->
<div class="header">
    <img src="All-Steel_web.png" alt="All Steel">
    <h1>CNC PRO</h1>
</div>

<div class="container">

<div class="tabs">
<button onclick="showTab('calc')">Calc</button>
<button onclick="showTab('zero')">Zero</button>
<button onclick="showTab('g')">G/M</button>
<button onclick="showTab('anilam')">Anilam</button>
</div>

<!-- CALC -->
<div id="calc">

<input id="diameter" value="10" placeholder="Diameter">

<select id="material" onchange="updateVC()">
<option value="stål">Stål</option>
<option value="rustfri">Rustfri</option>
<option value="alu">Alu</option>
<option value="jern">Jern</option>
</select>

<select id="tool" onchange="updateVC()">
<option value="HM">HM</option>
<option value="HSS">HSS</option>
</select>

<input id="vc" placeholder="vc">

<input id="teeth" value="4">
<input id="fz" value="0.05">

<div class="result">
RPM: <span id="rpm"></span><br>
Feed: <span id="feed"></span>
</div>

</div>

<!-- ZERO -->
<div id="zero" class="hide">

<p>Punkt 1</p>
<p>Punkt 2</p>

<input id="m1">
<input id="m2">

<div class="result">
Nul: <span id="zeroRes"></span>
</div>

</div>

<!-- G -->
<div id="g" class="hide">
Fanuc reference
</div>

<!-- ANILAM -->
<div id="anilam" class="hide">

<div class="help-box">
<b>Anilam system</b><br><br>

1. Indtast V-koder<br>
2. Kør G-kode<br><br>

Eksempel:<br>
V02 25<br>
V03 0<br>
G05
</div>

<input id="searchA" placeholder="Søg...">

<div>
<button onclick="setFilter('all')">Alle</button>
<button onclick="setFilter('v')">V-koder</button>
<button onclick="setFilter('bore')">Bore</button>
<button onclick="setFilter('mill')">Fræs</button>
<button onclick="setFilter('geo')">Geo</button>
<button onclick="setFilter('polar')">Polær</button>
<button onclick="setFilter('aux')">AUX</button>
</div>

<div id="alist"></div>
<div id="detail" class="result"></div>

</div>

</div>

<script>

// DATA
const anilam = [
{type:"v",group:"v",code:"V02",desc:"X data",detail:"X offset"},
{type:"g",group:"bore",code:"G83",desc:"Peck boring",detail:"Q step"},
{type:"g",group:"mill",code:"G75",desc:"Ramme",detail:"Frame milling"},
{type:"g",group:"geo",code:"G05",desc:"Ellipse",detail:"Ellipse"},
{type:"aux",group:"aux",code:"AUX 0003",desc:"Spindel",detail:"Start"}
];

// FILTER
let filter="all";

function setFilter(f){
    filter=f;
    showAnilam();
}

function showAnilam(){
    let list=document.getElementById("alist");
    list.innerHTML="";

    anilam.forEach(a=>{
        if(filter!="all"&&a.group!=filter)return;

        let d=document.createElement("div");
        d.className="code";
        d.innerText=a.code+" - "+a.desc;

        d.onclick=()=>{
            detail.innerText=a.code+"\n\n"+a.detail;
        }

        list.appendChild(d);
    });
}

// CALC
const vcTable={
stål:{HM:150,HSS:30},
rustfri:{HM:80,HSS:20},
alu:{HM:300,HSS:80},
jern:{HM:120,HSS:25}
};

function updateVC(){
vc.value=vcTable[material.value][tool.value];
}

setInterval(()=>{
let d=+diameter.value;
let v=+vc.value;
let z=+teeth.value;
let fzv=+fz.value;

if(d&&v){
let rpm=Math.round((v*1000)/(Math.PI*d));
let feed=Math.round(rpm*z*fzv);

document.getElementById("rpm").innerText=rpm;
document.getElementById("feed").innerText=feed;
}

if(m1.value&&m2.value){
zeroRes.innerText=((+m1.value + +m2.value)/2).toFixed(3);
}

},200);

// TABS
function showTab(t){
["calc","zero","g","anilam"].forEach(id=>{
document.getElementById(id).classList.toggle("hide",id!==t);
});
}

// INIT
updateVC();
showAnilam();

</script>

</body>
</html>
