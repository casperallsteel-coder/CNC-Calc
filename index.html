<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC PRO Tool</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 4px;
    margin-bottom: 8px;
    font-size: 16px;
}

button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
}

.tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
}

.result {
    background: #eee;
    padding: 10px;
    font-size: 14px;
    white-space: pre-wrap;
    font-family: monospace;
}

.code {
    border-bottom: 1px solid #ddd;
    padding: 6px;
    cursor: pointer;
}

.code:hover {
    background: #f9f9f9;
}

.small {
    font-size: 12px;
    color: gray;
}

.code-filter {
    display: flex;
    gap: 5px;
    margin-bottom: 8px;
}

.code-filter button {
    flex: 1;
    padding: 8px;
    font-size: 12px;
    background: #f0f0f0;
    border: 1px solid #ddd;
    cursor: pointer;
    border-radius: 4px;
}

.code-filter button.active {
    background: #0366d6;
    color: white;
    border-color: #0366d6;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGO -->
<div style="text-align:center">
    <img src="All-Steel_web.png" style="max-height:60px">
    <div>Tool</div>
</div>

<!-- TABS -->
<div class="tabs">
    <button onclick="showTab('calc')">Calc</button>
    <button onclick="showTab('zero')">Zero</button>
    <button onclick="showTab('g')">G/M Koder</button>
</div>

<!-- CALC -->
<div id="calc" class="card">

<img src="tool.gif" style="max-height:120px; display:block; margin:auto;">

<label><b>Diameter (mm)</b>
    <input id="diameter" type="number" value="10">
</label>

<label><b>Materiale</b>
    <select id="material" onchange="updateVC()">
        <option value="stål">Stål</option>
        <option value="rustfri">Rustfri</option>
        <option value="alu">Aluminium</option>
        <option value="jern">Jern</option>
    </select>
</label>

<label><b>Værktøjstype</b>
    <select id="tool" onchange="updateVC()">
        <option value="HM">HM (Hårdmetal)</option>
        <option value="HSS">HSS</option>
    </select>
</label>

<label><b>Skærehastighed vc (m/min)</b>
    <input id="vc" type="number">
</label>
<div class="small">Automatisk forslag – kan ændres</div>

<label><b>Antal tænder (z)</b>
    <input id="teeth" type="number" value="4">
</label>

<label><b>Feed pr tand fz (mm)</b>
    <input id="fz" type="number" step="0.01" value="0.05">
</label>

<div class="result">
    <b>RPM:</b> <span id="rpm"></span><br>
    <b>Feed:</b> <span id="feed"></span>
</div>

</div>

<!-- ZERO -->
<div id="zero" class="card" style="display:none">

<p><b>Punkt 1:</b> Mål første side af emnet</p>
<p><b>Punkt 2:</b> Mål modsatte side</p>

<input id="m1" type="number" placeholder="Måling 1">
<input id="m2" type="number" placeholder="Måling 2">

<div class="result">
    <b>Nulpunkt:</b> <span id="zeroRes"></span>
</div>

</div>

<!-- G/M CODE -->
<div id="g" class="card" style="display:none">

<input id="search" placeholder="Søg kode" onkeyup="filterCodes()">

<div class="code-filter">
    <button class="active" onclick="filterByType('all')">Alle</button>
    <button onclick="filterByType('g')">G-koder</button>
    <button onclick="filterByType('m')">M-koder</button>
</div>

<div id="list"></div>

<div id="detail" class="result"></div>

</div>

</div>

<script>

// VC tabel
const vcTable = {
    stål: { HM:150, HSS:30 },
    rustfri: { HM:80, HSS:20 },
    alu: { HM:300, HSS:80 },
    jern: { HM:120, HSS:25 }
};

// G-koder og M-koder
const codes = [
    // G-koder
    { type:"g", code:"G00", desc:"Hurtig positionering", detail:"Lineær hurtig bevægelse uden skæring\nSyntaks: G00 X Y Z" },
    { type:"g", code:"G01", desc:"Lineær interpolation", detail:"Lineær bevægelse med skæring\nSyntaks: G01 X Y Z F" },
    { type:"g", code:"G02", desc:"Cirkulær CW", detail:"Cirkulær bevægelse med ur\nSyntaks: G02 X Y I J F" },
    { type:"g", code:"G03", desc:"Cirkulær CCW", detail:"Cirkulær bevægelse mod ur\nSyntaks: G03 X Y I J F" },
    { type:"g", code:"G04", desc:"Dwell", detail:"Pause i programmet\nSyntaks: G04 P[tid ms]" },
    { type:"g", code:"G17", desc:"XY plan", detail:"Vælger XY plan til cirkler" },
    { type:"g", code:"G18", desc:"ZX plan", detail:"Vælger ZX plan til cirkler" },
    { type:"g", code:"G19", desc:"YZ plan", detail:"Vælger YZ plan til cirkler" },
    { type:"g", code:"G20", desc:"Tommer (inch)", detail:"Programmet kører i tommer" },
    { type:"g", code:"G21", desc:"Millimeter", detail:"Programmet kører i millimeter" },
    { type:"g", code:"G28", desc:"Home", detail:"Kører til maskinens nulpunkt\nSyntaks: G28 X Y Z" },
    { type:"g", code:"G40", desc:"Ingen kompensation", detail:"Værktøjsradius uden kompensation" },
    { type:"g", code:"G41", desc:"Radius komp venstre", detail:"Værktøjsradius kompensation venstre\nSyntaks: G41 D[værktøj nummer]" },
    { type:"g", code:"G42", desc:"Radius komp højre", detail:"Værktøjsradius kompensation højre\nSyntaks: G42 D[værktøj nummer]" },
    { type:"g", code:"G43", desc:"Længde kompensation +", detail:"Værktøjslængde kompensation plus\nSyntaks: G43 H[værktøj nummer] Z" },
    { type:"g", code:"G49", desc:"Ingen længde komp", detail:"Værktøjslængde uden kompensation" },
    { type:"g", code:"G54-G59", desc:"Arbejdskoordinat", detail:"Vælger arbejdskoordinatsystem 1-6" },
    { type:"g", code:"G65", desc:"Makro kald", detail:"Kalder makrounderprogrammer" },
    { type:"g", code:"G70", desc:"Finish cyklus", detail:"Finishing af boring eller gevind" },
    { type:"g", code:"G71", desc:"Roughing cyklus", detail:"Grovbearbejdning med emnedeling" },
    { type:"g", code:"G80", desc:"Annuller boring", detail:"Annullerer alle borings cyklusser" },
    { type:"g", code:"G81", desc:"Simpel boring", detail:"Fast boring\nSyntaks: G81 X Y Z R F" },
    { type:"g", code:"G82", desc:"Boring med dwell", detail:"Boring med pause\nSyntaks: G82 X Y Z R P F" },
    { type:"g", code:"G83", desc:"Peck boring", detail:"Boring med chips fjernelse\nQ = dybde pr stik\nSyntaks: G83 X Y Z R Q F" },
    { type:"g", code:"G84", desc:"Gevind boring", detail:"Gevind skæring ved boring\nSyntaks: G84 X Y Z R F" },
    { type:"g", code:"G85", desc:"Boring med retræk", detail:"Boring med hurtigt retræk\nSyntaks: G85 X Y Z R F" },
    { type:"g", code:"G90", desc:"Absolut koordinat", detail:"Koordinater som absolutte værdier" },
    { type:"g", code:"G91", desc:"Relativ koordinat", detail:"Koordinater som relative værdier" },
    { type:"g", code:"G92", desc:"Set position", detail:"Definerer nuværende position\nSyntaks: G92 X Y Z" },
    { type:"g", code:"G94", desc:"Feed mm/min", detail:"Feed i mm/min" },
    { type:"g", code:"G95", desc:"Feed per omdrejning", detail:"Feed som mm/omdrejning" },
    { type:"g", code:"G98", desc:"Retræk til R plan", detail:"Retræk til R værdi efter boring" },
    { type:"g", code:"G99", desc:"Retræk til start", detail:"Retræk til Z værdi fra start" },

    // M-koder
    { type:"m", code:"M00", desc:"Pause", detail:"Program pause - manuel genstart" },
    { type:"m", code:"M01", desc:"Betinget pause", detail:"Valgfri pause hvis knap er aktiveret" },
    { type:"m", code:"M02", desc:"Program slut", detail:"Afslutter program uden reset" },
    { type:"m", code:"M03", desc:"Spindel CW", detail:"Spindel rotation med uret\nSyntaks: M03 S[RPM]" },
    { type:"m", code:"M04", desc:"Spindel CCW", detail:"Spindel rotation mod uret\nSyntaks: M04 S[RPM]" },
    { type:"m", code:"M05", desc:"Spindel stop", detail:"Stanser spindelrotation" },
    { type:"m", code:"M06", desc:"Værktøjsbyt", detail:"Pauserer for manuel værktøjsbytning\nSyntaks: M06 T[værktøj nummer]" },
    { type:"m", code:"M07", desc:"Køler 2", detail:"Aktiverer anden kølervæske" },
    { type:"m", code:"M08", desc:"Køler 1", detail:"Aktiverer primær kølervæske" },
    { type:"m", code:"M09", desc:"Køler stop", detail:"Stoppper al kølervæske" },
    { type:"m", code:"M10", desc:"Emne spænding", detail:"Spænder emnet" },
    { type:"m", code:"M11", desc:"Emne løsning", detail:"Løsner emnet" },
    { type:"m", code:"M13", desc:"Spindel + køler", detail:"Spindel CW og køler på\nSyntaks: M13 S[RPM]" },
    { type:"m", code:"M14", desc:"Spindel CCW + køler", detail:"Spindel CCW og køler på" },
    { type:"m", code:"M19", desc:"Spindel orientering", detail:"Orienterer spindel til position" },
    { type:"m", code:"M21", desc:"Emne skifter", detail:"Automatisk emne skifter" },
    { type:"m", code:"M30", desc:"Program slut", detail:"Afslutter program og resets" },
    { type:"m", code:"M98", desc:"Subprogram kald", detail:"Kalder subprogram\nSyntaks: M98 P[program nr]" },
    { type:"m", code:"M99", desc:"Subprogram slut", detail:"Afslutter subprogram og vender tilbage" }
];

let currentFilter = "all";

// Tabs
function showTab(name){
    document.getElementById("calc").style.display="none";
    document.getElementById("zero").style.display="none";
    document.getElementById("g").style.display="none";
    document.getElementById(name).style.display="block";
}

// Auto VC
function updateVC(){
    let mat = document.getElementById("material").value;
    let tool = document.getElementById("tool").value;
    document.getElementById("vc").value = vcTable[mat][tool];
}

// Beregning loop
setInterval(()=>{
    let d = parseFloat(document.getElementById("diameter").value);
    let vc = parseFloat(document.getElementById("vc").value);
    let z = parseFloat(document.getElementById("teeth").value);
    let fz = parseFloat(document.getElementById("fz").value);

    if(d && vc){
        let rpm = Math.round((vc*1000)/(Math.PI*d));
        let feed = Math.round(rpm*z*fz);

        document.getElementById("rpm").innerText = rpm;
        document.getElementById("feed").innerText = feed;
    }

    let m1 = parseFloat(document.getElementById("m1").value);
    let m2 = parseFloat(document.getElementById("m2").value);

    if(m1 && m2){
        document.getElementById("zeroRes").innerText = ((m1+m2)/2).toFixed(3);
    }

},200);

// Filter by type
function filterByType(type){
    currentFilter = type;
    
    // Update active button
    document.querySelectorAll(".code-filter button").forEach(btn => {
        btn.classList.remove("active");
    });
    event.target.classList.add("active");
    
    filterCodes();
}

// Koder filter
function filterCodes(){
    let q = document.getElementById("search").value.toLowerCase();
    let list = document.getElementById("list");
    list.innerHTML="";

    codes.forEach(c=>{
        // Filter by type
        if(currentFilter !== "all" && c.type !== currentFilter) return;

        // Filter by search
        if(q && !c.code.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return;

        let div = document.createElement("div");
        div.className="code";
        div.innerText = c.code + " - " + c.desc;

        div.onclick = ()=>{
            document.getElementById("detail").innerText = c.code + " - " + c.desc + "\n\n" + c.detail;
        };

        list.appendChild(div);
    });
}

// init
updateVC();
filterCodes();

</script>

</body>
</html>
